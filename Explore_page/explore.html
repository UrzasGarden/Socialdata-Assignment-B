<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Explore the Data</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../Main_page/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Layout Styles */
        .explore-layout { display: flex; flex-direction: row; gap: 2rem; align-items: flex-start; }
        .sidebar-card { flex: 1; min-width: 250px; max-width: 350px; display: flex; flex-direction: column; gap: 1.5rem; }
        .main-content { flex: 3; min-width: 0; display: flex; flex-direction: column; gap: 2rem; }

        /* Controls Formatting */
        .control-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .control-group label { color: var(--text-secondary); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .control-group select { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: white; border-radius: 8px; font-family: 'Inter', sans-serif; outline: none; }
        .control-group select option { background: #0a0b10; color: white; }
        
        /* Buttons */
        .graph-options { display: flex; gap: 10px; }
        .graph-btn { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); padding: 10px; border-radius: 8px; cursor: pointer; font-size: 20px; transition: all 0.2s; }
        .graph-btn.active { border-color: var(--accent-1); background: rgba(59, 130, 246, 0.15); box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }
        .update-btn { width: 100%; background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); color: white; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: 'Inter', sans-serif; transition: opacity 0.2s; font-size: 1rem; }
        .update-btn:hover { opacity: 0.9; box-shadow: 0 0 20px rgba(139, 92, 246, 0.4); }

        /* Navigation */
        .top-nav { position: absolute; top: 1.5rem; right: 2rem; display: flex; gap: 1.5rem; font-size: 0.95rem; z-index: 200; }
        .top-nav a { color: var(--text-secondary); text-decoration: none; font-weight: 500; transition: color 0.2s ease; }
        .top-nav a:hover, .top-nav a.active { color: #fff; }

        /* Map Toggles */
        .map-toggles { display: flex; background: rgba(0, 0, 0, 0.4); border-radius: 10px; padding: 5px; margin-bottom: 0.5rem; width: 100%; }
        .toggle-btn { flex: 1; padding: 8px 12px; text-align: center; border-radius: 6px; cursor: pointer; color: var(--text-secondary); font-size: 0.85rem; font-weight: 600; transition: all 0.3s ease; border: none; background: none; font-family: 'Inter', sans-serif; }
        .toggle-btn.active { background: rgba(255, 255, 255, 0.1); color: #fff; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2); }

        /* ==========================================
           MAP WRAPPER & ZOOM CONTROLS (NEW)
           ========================================== */
        #map-wrapper {
            position: relative;
            width: 100%; height: 280px; 
            border: 1px dashed var(--glass-border); 
            border-radius: 10px; 
            background: rgba(0,0,0,0.2); 
            overflow: hidden; /* Crucial: Hides map when zoomed in */
            cursor: grab;
        }
        #map-wrapper:active { cursor: grabbing; }

        /* The actual div that moves and scales */
        #svg-container {
            width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center;
            transform-origin: 0 0; /* Keeps math simple for panning */
            will-change: transform;
        }

        /* Floating Zoom Buttons */
        .zoom-controls {
            position: absolute;
            bottom: 15px;
            right: 15px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 50;
        }
        .zoom-btn {
            background: rgba(10, 11, 16, 0.8);
            color: #fff;
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            width: 32px; height: 32px;
            font-size: 16px; font-weight: bold;
            cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }
        .zoom-btn:hover { background: var(--accent-1); border-color: #fff; }

        /* SVG Styles */
        .denmark-svg { width: 100%; height: 100%; max-height: 280px; display: block; pointer-events: none; }
        .denmark-svg path, .denmark-svg polygon { fill: rgba(255, 255, 255, 0.15) !important; stroke: rgba(255, 255, 255, 0.3) !important; stroke-width: 0.5px !important; transition: fill 0.2s ease, stroke 0.2s ease; cursor: pointer; pointer-events: auto; }
        .denmark-svg path:hover, .denmark-svg polygon:hover { fill: rgba(59, 130, 246, 0.6) !important; }
        .denmark-svg path.active, .denmark-svg polygon.active { fill: var(--accent-1) !important; stroke: #fff !important; stroke-width: 1.5px !important; filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.8)); z-index: 10; }
        
        .reset-map { margin-top: 15px; cursor: pointer; border: none; background: none; color: var(--accent-1); font-weight: bold; font-family: 'Inter', sans-serif; }
        .reset-map:hover { text-shadow: 0 0 8px rgba(59, 130, 246, 0.5); }

        /* Tooltip */
        #map-tooltip { position: absolute; background: rgba(10, 11, 16, 0.95); color: #fff; padding: 8px 14px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; pointer-events: none; opacity: 0; transition: opacity 0.2s ease; z-index: 1000; border: 1px solid var(--glass-border); box-shadow: 0 4px 15px rgba(0,0,0,0.5); font-family: 'Inter', sans-serif; text-transform: capitalize; }
        .selection-label { color: var(--accent-1); font-weight: 600; font-size: 0.95rem; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>

    <div id="map-tooltip"></div>

    <div class="background-animation">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <header class="glass-header" style="padding: 1.5rem; display: flex; justify-content: space-between; align-items: center; text-align: left;">
        <div style="font-weight: bold; font-size: 1.2rem; background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">INDKP107 Explorer</div>
        <nav class="top-nav">
            <a href="../index.html">Data Story</a>
            <a href="explore.html" class="active">Dashboard</a>
        </nav>
    </header>

    <main class="dashboard explore-layout">
        <aside class="glass-card sidebar-card">
            <div class="card-header" style="margin-bottom: 0.5rem;">
                <h2>Parameters</h2>
                <div class="subtitle">Filter the dataset</div>
            </div>

            <div class="control-group">
                <label for="edu-select">Education Level</label>
                <select id="edu-select">
                    <option value="masters">Master's Degree</option>
                    <option value="vocational">Vocational Training</option>
                    <option value="primary">Primary Education</option>
                </select>
            </div>
            
            <div class="control-group">
                <label>Visualization Type</label>
                <div class="graph-options">
                    <button class="graph-btn active" data-type="bar" title="Bar Chart">📊</button>
                    <button class="graph-btn" data-type="line" title="Line Chart">📈</button>
                    <button class="graph-btn" data-type="heatmap" title="Heatmap">🔥</button>
                </div>
            </div>
            
            <button class="update-btn" id="explore-btn">Update Data</button>
        </aside>

        <div class="main-content">
            <div class="glass-card" style="display: flex; flex-direction: column; align-items: center;">
                <div class="card-header" style="text-align: center; margin-bottom: 1rem; width: 100%;">
                    <h2>Geographic Filter</h2>
                    <div class="subtitle">Scroll to zoom. Click & drag to pan.</div>
                </div>
                
                <div class="map-toggles">
                    <button class="toggle-btn" data-level="country">Whole Country</button>
                    <button class="toggle-btn active" data-level="region">Regions</button>
                    <button class="toggle-btn" data-level="kommune">Municipalities</button>
                </div>
                
                <div class="selection-label" id="current-selection-text">Currently Selected: None</div>
                
                <!-- THE INTERACTIVE MAP WRAPPER -->
                <div id="map-wrapper">
                    <!-- Zoom Controls -->
                    <div class="zoom-controls">
                        <button class="zoom-btn" id="btn-zoom-in" title="Zoom In">+</button>
                        <button class="zoom-btn" id="btn-zoom-out" title="Zoom Out">-</button>
                        <button class="zoom-btn" id="btn-zoom-reset" title="Reset View">↺</button>
                    </div>
                    <!-- The SVG Container -->
                    <div id="svg-container"></div>
                </div>

                <button class="reset-map" id="reset-map">Clear Selection</button>
            </div>
            
            <div class="glass-card chart-card">
                <div class="chart-wrapper" id="canvas-container" style="height: 350px; width: 100%;">
                    <canvas id="myChart"></canvas> 
                </div>
                
                <div id="heatmap-container" style="display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 350px;">
                    <h2 id="heatmap-title" style="margin-top: 0; color: #fff; font-size: 1.3rem; font-weight: 600; margin-bottom: 1rem;">Income Heatmap</h2>
                    <div id="heatmap-grid" style="display: grid; grid-template-columns: 120px 1fr 1fr; gap: 12px; width: 100%; max-width: 500px;">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        Chart.defaults.color = '#94a3b8'; 
        Chart.defaults.borderColor = 'rgba(255, 255, 255, 0.05)'; 
        Chart.defaults.font.family = "'Inter', sans-serif";

        function getAreaName(element) {
            const titleNode = element.querySelector('title');
            if (titleNode) return titleNode.textContent;
            const attrName = element.getAttribute('name') || element.getAttribute('data-name') || element.getAttribute('title') || element.getAttribute('id');
            if (attrName) {
                if (attrName.startsWith('path') || attrName.startsWith('polygon')) return "Selected Area";
                return attrName.replace(/_/g, ' '); 
            }
            return "Unknown Area";
        }

        // ==========================================
        // PAN AND ZOOM LOGIC
        // ==========================================
        const mapWrapper = document.getElementById('map-wrapper');
        const svgContainer = document.getElementById('svg-container');
        
        let scale = 1;
        let pointX = 0;
        let pointY = 0;
        let startX, startY;
        let isPanning = false;
        let isDraggingMap = false; // Safety check to prevent accidental clicks while panning

        function setTransform() {
            // Apply CSS transform to physically move and scale the map div
            svgContainer.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`;
        }

        // 1. Scroll to Zoom
        mapWrapper.addEventListener('wheel', (e) => {
            e.preventDefault();
            // Mouse math to zoom in on the exact spot your cursor is pointing
            const xs = (e.clientX - pointX) / scale;
            const ys = (e.clientY - pointY) / scale;
            const delta = (e.wheelDelta ? e.wheelDelta : -e.deltaY);
            
            (delta > 0) ? (scale *= 1.2) : (scale /= 1.2);
            scale = Math.min(Math.max(0.5, scale), 10); // Prevent zooming out/in too far
            
            pointX = e.clientX - xs * scale;
            pointY = e.clientY - ys * scale;
            
            if (scale === 1) { pointX = 0; pointY = 0; } // Auto-center if fully zoomed out
            setTransform();
        });

        // 2. Click and Drag to Pan
        mapWrapper.addEventListener('mousedown', (e) => {
            e.preventDefault();
            startX = e.clientX - pointX;
            startY = e.clientY - pointY;
            isPanning = true;
            isDraggingMap = false; // Reset drag state
        });

        mapWrapper.addEventListener('mousemove', (e) => {
            if (!isPanning) return;
            e.preventDefault();
            pointX = e.clientX - startX;
            pointY = e.clientY - startY;
            setTransform();
            isDraggingMap = true; // User is moving the mouse, it's a drag!
        });

        mapWrapper.addEventListener('mouseup', () => { isPanning = false; });
        mapWrapper.addEventListener('mouseleave', () => { isPanning = false; });

        // 3. Floating Button Controls
        document.getElementById('btn-zoom-in').addEventListener('click', () => {
            scale *= 1.3; scale = Math.min(scale, 10); setTransform();
        });
        document.getElementById('btn-zoom-out').addEventListener('click', () => {
            scale /= 1.3; scale = Math.max(scale, 0.5); setTransform();
        });
        document.getElementById('btn-zoom-reset').addEventListener('click', () => {
            scale = 1; pointX = 0; pointY = 0; setTransform();
        });


        // ==========================================
        // MAP FETCHING
        // ==========================================
        fetch('../Main_page/Map_DK.svg')
            .then(response => {
                if (!response.ok) throw new Error("Could not find Map_DK.svg");
                return response.text();
            })
            .then(svgData => {
                svgContainer.innerHTML = svgData;
                const mapSvg = document.querySelector('#svg-container svg');
                if (mapSvg) {
                    mapSvg.classList.add('denmark-svg');
                    mapSvg.removeAttribute('width'); mapSvg.removeAttribute('height');
                    setTimeout(() => {
                        try {
                            const bbox = mapSvg.getBBox();
                            const padding = 10;
                            const newViewBox = `${bbox.x - padding} ${bbox.y - padding} ${bbox.width + padding * 2} ${bbox.height + padding * 2}`;
                            mapSvg.setAttribute('viewBox', newViewBox);
                            mapSvg.style.width = '100%'; mapSvg.style.height = '100%';
                        } catch (e) { console.error("Could not calculate BBox:", e); }
                    }, 50); 
                }
            })
            .catch(error => console.error("Error loading Map_DK.svg:", error));


        // ==========================================
        // DASHBOARD DATA & UPDATING
        // ==========================================
        const mockData = {
            masters: { men: [48000, 43000, 42000], women: [41000, 37000, 36000] },
            vocational: { men: [38000, 36000, 35000], women: [33000, 31000, 30000] },
            primary: { men: [31000, 29500, 29000], women: [28000, 27500, 27000] }
        };
        const allLabels = ['Hovedstaden', 'Midtjylland', 'Syddanmark'];

        let currentEdu = 'masters';
        let currentType = 'bar';
        let currentRegionIndex = 'all'; 
        let currentMapLevel = 'region'; 

        const ctx = document.getElementById('myChart').getContext('2d');
        let regionChart = new Chart(ctx, {
            type: currentType,
            data: {
                labels: allLabels,
                datasets: [
                    { label: 'Men', data: mockData.masters.men, backgroundColor: '#3b82f6', borderColor: '#3b82f6', borderWidth: 2, borderRadius: 4 },
                    { label: 'Women', data: mockData.masters.women, backgroundColor: '#ec4899', borderColor: '#ec4899', borderWidth: 2, borderRadius: 4 }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { title: { display: true, text: "Income Gap: Master's Degree", color: '#fff', font: { size: 16, weight: '600' } } }
            }
        });

        function updateDashboard() {
            const dataSet = mockData[currentEdu];
            const eduText = document.getElementById('edu-select').options[document.getElementById('edu-select').selectedIndex].text;

            if (currentType === 'heatmap') {
                document.getElementById('canvas-container').style.display = 'none';
                document.getElementById('heatmap-container').style.display = 'flex';
                document.getElementById('heatmap-title').innerText = "Income Heatmap: " + eduText;
                
                const grid = document.getElementById('heatmap-grid');
                grid.innerHTML = '<div></div><div style="font-weight:600;text-align:center;color:var(--text-secondary);text-transform:uppercase;font-size:0.85rem;">Men</div><div style="font-weight:600;text-align:center;color:var(--text-secondary);text-transform:uppercase;font-size:0.85rem;">Women</div>';
                
                allLabels.forEach((region, i) => {
                    if (currentRegionIndex === 'all' || currentRegionIndex === i) {
                        const menVal = dataSet.men[i];
                        const womenVal = dataSet.women[i];
                        
                        const menAlpha = Math.max(0.1, (menVal - 20000) / 30000);
                        const womenAlpha = Math.max(0.1, (womenVal - 20000) / 30000);
                        
                        grid.innerHTML += `<div style="display:flex; align-items:center; font-weight:500; color:var(--text-primary);">${region}</div>`;
                        grid.innerHTML += `<div style="background-color: rgba(59, 130, 246, ${menAlpha}); color: #fff; padding: 15px; text-align: center; border-radius: 8px; border: 1px solid rgba(59, 130, 246, 0.2); box-shadow: inset 0 0 20px rgba(255,255,255,0.05); font-weight: 500;">${menVal} DKK</div>`;
                        grid.innerHTML += `<div style="background-color: rgba(236, 72, 153, ${womenAlpha}); color: #fff; padding: 15px; text-align: center; border-radius: 8px; border: 1px solid rgba(236, 72, 153, 0.2); box-shadow: inset 0 0 20px rgba(255,255,255,0.05); font-weight: 500;">${womenVal} DKK</div>`;
                    }
                });
            } else {
                document.getElementById('canvas-container').style.display = 'block';
                document.getElementById('heatmap-container').style.display = 'none';
                
                if (currentRegionIndex === 'all') {
                    regionChart.data.labels = allLabels;
                    regionChart.data.datasets[0].data = dataSet.men;
                    regionChart.data.datasets[1].data = dataSet.women;
                    regionChart.options.plugins.title.text = "Income Gap: " + eduText + " (All Regions)";
                } else {
                    regionChart.data.labels = [allLabels[currentRegionIndex]];
                    regionChart.data.datasets[0].data = [dataSet.men[currentRegionIndex]];
                    regionChart.data.datasets[1].data = [dataSet.women[currentRegionIndex]];
                    regionChart.options.plugins.title.text = "Income Gap: " + eduText + " (" + allLabels[currentRegionIndex] + ")";
                }

                regionChart.config.type = currentType; 
                regionChart.update();
            }
        }

        // ==========================================
        // EVENTS: UI & TOGGLES
        // ==========================================
        document.getElementById('explore-btn').addEventListener('click', () => { currentEdu = document.getElementById('edu-select').value; updateDashboard(); });

        document.querySelectorAll('.graph-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.graph-btn').forEach(b => b.classList.remove('active'));
                const clickedBtn = e.target.closest('.graph-btn');
                clickedBtn.classList.add('active');
                currentType = clickedBtn.dataset.type;
                updateDashboard();
            });
        });

        document.querySelectorAll('.toggle-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentMapLevel = e.target.dataset.level;
                document.querySelectorAll('.denmark-svg path, .denmark-svg polygon').forEach(p => p.classList.remove('active'));
                
                if (currentMapLevel === 'country') {
                    document.querySelectorAll('.denmark-svg path, .denmark-svg polygon').forEach(p => p.classList.add('active'));
                    document.getElementById('current-selection-text').innerText = "Currently Selected: Whole Country";
                    currentRegionIndex = 'all';
                } else {
                    document.getElementById('current-selection-text').innerText = "Currently Selected: None";
                    currentRegionIndex = 'all';
                }
                updateDashboard();
            });
        });

        // ==========================================
        // EVENTS: MOUSE HOVER (TOOLTIP)
        // ==========================================
        const tooltip = document.getElementById('map-tooltip');
        
        document.getElementById('svg-container').addEventListener('mousemove', (e) => {
            const hoveredPath = e.target.closest('path, polygon');
            if (hoveredPath) {
                tooltip.innerText = getAreaName(hoveredPath);
                tooltip.style.opacity = '1';
                tooltip.style.left = (e.pageX + 15) + 'px';
                tooltip.style.top = (e.pageY + 15) + 'px';
            } else {
                tooltip.style.opacity = '0';
            }
        });
        document.getElementById('svg-container').addEventListener('mouseleave', () => { tooltip.style.opacity = '0'; });

        // ==========================================
        // EVENTS: MAP CLICKS
        // ==========================================
        document.getElementById('svg-container').addEventListener('click', (e) => {
            // SAFETY CHECK: If the user was dragging to pan, don't trigger a click!
            if (isDraggingMap) return;

            const clickedPath = e.target.closest('path, polygon');
            if (!clickedPath) return; 
            
            document.querySelectorAll('.denmark-svg path, .denmark-svg polygon').forEach(p => p.classList.remove('active'));

            let areaName = getAreaName(clickedPath);

            if (currentMapLevel === 'country') {
                document.querySelectorAll('.denmark-svg path, .denmark-svg polygon').forEach(p => p.classList.add('active'));
                document.getElementById('current-selection-text').innerText = "Currently Selected: Whole Country";
            }
            else if (currentMapLevel === 'region') {
                // Ignore the SVG's broken drawing groups! 
                // For the skeleton, just highlight the clicked path.
                clickedPath.classList.add('active'); 
                
                // Note to self for later: We will need to use a JS dictionary 
                // to map municipalities to their regions once the data is clean!
                document.getElementById('current-selection-text').innerText = "Currently Selected: " + areaName + " (Region Mapping Needed)";
            }
            else if (currentMapLevel === 'kommune') {
                clickedPath.classList.add('active');
                document.getElementById('current-selection-text').innerText = "Currently Selected: " + areaName;
            }
            
            if (areaName.toLowerCase().includes('hovedstaden')) currentRegionIndex = 0;
            else if (areaName.toLowerCase().includes('midtjylland')) currentRegionIndex = 1;
            else if (areaName.toLowerCase().includes('syddanmark')) currentRegionIndex = 2;
            else currentRegionIndex = 0;
            
            updateDashboard(); 
        });

        document.getElementById('reset-map').addEventListener('click', () => {
            currentRegionIndex = 'all';
            document.getElementById('current-selection-text').innerText = "Currently Selected: None";
            document.querySelectorAll('.denmark-svg path, .denmark-svg polygon').forEach(r => r.classList.remove('active'));
            
            // Also reset zoom when clearing selection!
            scale = 1; pointX = 0; pointY = 0; setTransform();
            
            updateDashboard();
        });
    </script>
</body>
</html>
